<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Web Audio Mixer & Recorder with Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #2c3e50;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #0fbcf9; }
        .section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #485460;
        }
        .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .controls-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 15px 0;
            text-align: left;
        }
        .control-group { flex: 1; }
        select, input[type="file"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #718093;
            background-color: #353b48;
            color: white;
            box-sizing: border-box;
        }
        audio { width: 100%; margin-top: 10px; height: 35px; outline: none; }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #startBtn { background-color: #05c46b; color: white; }
        #stopBtn { background-color: #ff3f34; color: white; }
        .download-btn { background-color: #3c40c6; color: white; }
        .download-btn:hover { background-color: #575fcf; }
        button:disabled { background-color: #808e9b; color: #d2dae2; cursor: not-allowed; }
        
        /* Visualizer Screen */
        canvas {
            width: 100%;
            height: 100px;
            background-color: #101418;
            border-radius: 6px;
            margin-top: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            display: block;
        }

        .preview-box {
            background: #353b48;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .preview-box h4 { margin: 0 0 10px 0; font-size: 14px; color: #0fbcf9; }
        
        .status { font-size: 14px; color: #ffdd59; margin-top: 10px; min-height: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pro Studio Mixer</h2>
    
    <div class="section">
        <label for="audioFile"><strong>1. Upload Backing Track:</strong></label>
        <input type="file" id="audioFile" accept="audio/*">
        <audio id="backingTrack" controls></audio>
        
        <div class="controls-row">
            <div class="control-group">
                <label for="bitrateSelect">Vocal Bitrate:</label>
                <select id="bitrateSelect">
                    <option value="32000">32 kbps</option>
                    <option value="64000">64 kbps</option>
                    <option value="128000">128 kbps</option>
                    <option value="256000" selected>256 kbps (HQ)</option>
                    <option value="320000">320 kbps (Studio)</option>
                    <option value="480000">480 kbps (Max)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="formatSelect">Export Format:</label>
                <select id="formatSelect">
                    <option value="mp3">MP3</option>
                    <option value="wav" selected>WAV (Uncompressed)</option>
                    <option value="webm">WebM (Native)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section">
        <strong>2. Record Vocals:</strong><br>
        <button id="startBtn" disabled>Start Recording</button>
        <button id="stopBtn" disabled>Stop Recording</button>
        
        <canvas id="visualizer"></canvas>

        <div id="statusText" class="status">Please upload an audio file first.</div>
    </div>

    <div class="section preview-box" id="previewSection">
        <h4>3. Preview & Download</h4>
        
        <div style="text-align: left; margin-bottom: 10px;">
            <label><strong>Mixed Audio (Beat + Vocals):</strong></label>
            <audio id="previewMixed" controls></audio>
            <button class="download-btn" id="dlMixedBtn">Download Mix</button>
        </div>
        
        <div style="text-align: left;">
            <label><strong>Vocal Track Only:</strong></label>
            <audio id="previewMic" controls></audio>
            <button class="download-btn" id="dlMicBtn">Download Vocals</button>
        </div>
    </div>
</div>

<script>
    // Elements
    const audioFileInput = document.getElementById('audioFile');
    const backingTrackEl = document.getElementById('backingTrack');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    
    const previewSection = document.getElementById('previewSection');
    const previewMixed = document.getElementById('previewMixed');
    const previewMic = document.getElementById('previewMic');
    
    const bitrateSelect = document.getElementById('bitrateSelect');
    const formatSelect = document.getElementById('formatSelect');
    
    // Canvas Visualizer Setup
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    // Initial flat line on canvas
    canvasCtx.fillStyle = '#101418';
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeStyle = '#0fbcf9';
    canvasCtx.beginPath();
    canvasCtx.moveTo(0, canvas.height / 2);
    canvasCtx.lineTo(canvas.width, canvas.height / 2);
    canvasCtx.stroke();

    // Audio Context & Nodes
    let audioCtx, mixedDest, trackSourceNode, micSourceNode, micStream;
    let mixedRecorder, micRecorder;
    let mixedChunks = [], micChunks = [];
    let analyser, animationId;
    
    // Final Blobs for Preview/Download
    let finalMixedBlob = null;
    let finalMicBlob = null;

    // 1. Upload Handler
    audioFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            backingTrackEl.src = URL.createObjectURL(file);
            startBtn.disabled = false;
            statusText.innerText = "Ready to record. Press Start.";
            previewSection.style.display = 'none'; 
        }
    });

    // Drawing the Waveform Loop
    function drawWaveform() {
        animationId = requestAnimationFrame(drawWaveform);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#101418';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#0fbcf9'; // Blue waveform color
        canvasCtx.beginPath();

        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = v * (canvas.height / 2);

            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);

            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    // 2. Start Recording
    startBtn.addEventListener('click', async () => {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mixedDest = audioCtx.createMediaStreamDestination();
                trackSourceNode = audioCtx.createMediaElementSource(backingTrackEl);
                trackSourceNode.connect(audioCtx.destination);
                trackSourceNode.connect(mixedDest);
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
                video: false 
            });
            
            micSourceNode = audioCtx.createMediaStreamSource(micStream);
            micSourceNode.connect(mixedDest);

            // Connect mic to Analyser for the Visualizer
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            micSourceNode.connect(analyser);
            drawWaveform(); // Start drawing

            mixedChunks = []; micChunks = [];
            
            // Apply User's Selected Bitrate
            const bps = parseInt(bitrateSelect.value);
            const options = { audioBitsPerSecond: bps };

            mixedRecorder = new MediaRecorder(mixedDest.stream, options);
            micRecorder = new MediaRecorder(micStream, options);

            mixedRecorder.ondataavailable = e => { if (e.data.size > 0) mixedChunks.push(e.data); };
            micRecorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };

            mixedRecorder.onstop = () => {
                finalMixedBlob = new Blob(mixedChunks, { type: 'audio/webm' });
                previewMixed.src = URL.createObjectURL(finalMixedBlob);
            };

            micRecorder.onstop = () => {
                finalMicBlob = new Blob(micChunks, { type: 'audio/webm' });
                previewMic.src = URL.createObjectURL(finalMicBlob);
                previewSection.style.display = 'block'; 
            };

            mixedRecorder.start(); micRecorder.start();
            backingTrackEl.currentTime = 0; backingTrackEl.play();

            startBtn.disabled = true; stopBtn.disabled = false; audioFileInput.disabled = true;
            statusText.innerText = `🔴 Recording at ${bps/1000} kbps...`;
            statusText.style.color = "#ff3f34";

        } catch (err) {
            console.error(err);
            statusText.innerText = "Error accessing microphone: " + err.message;
        }
    });

    // 3. Stop Recording
    stopBtn.addEventListener('click', () => {
        if (mixedRecorder && mixedRecorder.state !== 'inactive') mixedRecorder.stop();
        if (micRecorder && micRecorder.state !== 'inactive') micRecorder.stop();
        
        backingTrackEl.pause();
        if (micSourceNode) micSourceNode.disconnect();
        if (micStream) micStream.getTracks().forEach(track => track.stop());

        // Stop the visualizer animation
        cancelAnimationFrame(animationId);

        startBtn.disabled = false; stopBtn.disabled = true; audioFileInput.disabled = false;
        statusText.innerText = "Recording complete! Listen to the previews below.";
        statusText.style.color = "#05c46b";
    });

    // --- Audio Conversion & Download Logic ---
    document.getElementById('dlMixedBtn').addEventListener('click', () => processAndDownload(finalMixedBlob, 'Mixed_Track'));
    document.getElementById('dlMicBtn').addEventListener('click', () => processAndDownload(finalMicBlob, 'Vocal_Only'));

    async function processAndDownload(webmBlob, filenameBase) {
        if (!webmBlob) return;
        
        const format = formatSelect.value;
        statusText.innerText = `Converting to ${format.toUpperCase()}... please wait.`;
        statusText.style.color = "#ffdd59";
        
        let outBlob = webmBlob;
        let ext = "webm";

        if (format === 'wav' || format === 'mp3') {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);

            if (format === 'wav') {
                outBlob = audioBufferToWav(audioBuffer);
                ext = "wav";
            } else if (format === 'mp3') {
                outBlob = await encodeMp3(audioBuffer);
                ext = "mp3";
            }
        }

        const url = URL.createObjectURL(outBlob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = `${filenameBase}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusText.innerText = "Download completed successfully!";
        statusText.style.color = "#05c46b";
    }

    // WAV Encoder (Raw PCM Data)
    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferArray = new ArrayBuffer(length),
            view = new DataView(bufferArray),
            channels = [], i, sample, offset = 0, pos = 0;

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);

        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while (pos < buffer.length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true); offset += 2;
            }
            pos++;
        }
        return new Blob([bufferArray], {type: "audio/wav"});

        function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
        function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }
    }

    // MP3 Encoder using lamejs
    async function encodeMp3(audioBuffer) {
        if (!window.lamejs) {
            alert("MP3 encoder library failed to load. Downloading as WAV instead.");
            return audioBufferToWav(audioBuffer);
        }
        
        const channels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 192); 
        const mp3Data = [];
        const sampleBlockSize = 1152;
        
        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
        
        const leftInt16 = new Int16Array(left.length);
        const rightInt16 = new Int16Array(right.length);
        
        for (let i = 0; i < left.length; i++) {
            leftInt16[i] = left[i] * 32767.5;
            rightInt16[i] = right[i] * 32767.5;
        }

        for (let i = 0; i < left.length; i += sampleBlockSize) {
            const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
            const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
            const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
        
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }
</script>

</body>
</html>
