<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Web Audio Studio (Audacity Reverb Engine)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #2c3e50;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
        }
        h2 { margin-top: 0; color: #0fbcf9; text-align: center; }
        .section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #485460;
        }
        .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        /* Two Column Layout */
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        select, input[type="file"], input[type="range"] {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #718093;
            background-color: #353b48;
            color: white;
            box-sizing: border-box;
        }
        audio { width: 100%; margin-top: 10px; height: 35px; outline: none; }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #startBtn { background-color: #05c46b; color: white; width: 47%; }
        #stopBtn { background-color: #ff3f34; color: white; width: 47%; }
        .download-btn { background-color: #3c40c6; color: white; width: 100%; margin: 5px 0;}
        .download-btn:hover { background-color: #575fcf; }
        button:disabled { background-color: #808e9b; color: #d2dae2; cursor: not-allowed; }
        
        /* Audacity Reverb Panel */
        .effect-panel {
            background-color: #101418;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #0fbcf9;
        }
        .slider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
            margin-top: 10px;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            color: #bdc3c7;
        }

        /* Visualizer Screen */
        canvas {
            width: 100%;
            height: 80px;
            background-color: #101418;
            border-radius: 6px;
            margin-top: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            display: block;
        }

        .preview-box { background: #353b48; padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
        .preview-box h4 { margin: 0 0 10px 0; font-size: 14px; color: #0fbcf9; }
        .status { font-size: 14px; color: #ffdd59; margin-top: 10px; min-height: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pro Studio Mixer</h2>
    
    <div class="section grid-2col">
        <div>
            <label><strong>1. Upload Backing Track:</strong></label>
            <input type="file" id="audioFile" accept="audio/*">
            <audio id="backingTrack" controls></audio>
        </div>
        <div>
            <label><strong>Export Settings:</strong></label>
            <div style="margin-bottom: 5px;">
                <select id="bitrateSelect">
                    <option value="128000">128 kbps</option>
                    <option value="256000" selected>256 kbps (HQ)</option>
                    <option value="320000">320 kbps (Studio)</option>
                </select>
            </div>
            <div>
                <select id="formatSelect">
                    <option value="mp3">MP3 Output</option>
                    <option value="wav" selected>WAV Output (Uncompressed)</option>
                    <option value="webm">WebM Output</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section">
        <label style="color: #0fbcf9; font-weight: bold; font-size: 16px;">
            <input type="checkbox" id="reverbToggle" checked> 🎤 Enable Audacity-Style Reverb
        </label>
        
        <div class="effect-panel" id="reverbControls">
            <div class="slider-grid">
                <div class="slider-group">
                    <div class="slider-header"><span>Room Size (%)</span><span id="val_room">75</span></div>
                    <input type="range" id="param_room" min="0" max="100" value="75">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Pre-delay (ms)</span><span id="val_predelay">10</span></div>
                    <input type="range" id="param_predelay" min="0" max="200" value="10">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Reverberance (%)</span><span id="val_rev">50</span></div>
                    <input type="range" id="param_rev" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Damping (%)</span><span id="val_damp">50</span></div>
                    <input type="range" id="param_damp" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Tone Low (%)</span><span id="val_tonelow">100</span></div>
                    <input type="range" id="param_tonelow" min="0" max="100" value="100">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Tone High (%)</span><span id="val_tonehigh">100</span></div>
                    <input type="range" id="param_tonehigh" min="0" max="100" value="100">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Wet Gain (dB)</span><span id="val_wetgain">-1</span></div>
                    <input type="range" id="param_wetgain" min="-20" max="10" value="-1" step="0.5">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Dry Gain (dB)</span><span id="val_drygain">-1</span></div>
                    <input type="range" id="param_drygain" min="-20" max="10" value="-1" step="0.5">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Stereo Width (%)</span><span id="val_width">100</span></div>
                    <input type="range" id="param_width" min="0" max="100" value="100">
                </div>
            </div>
        </div>
    </div>

    <div class="section" style="text-align: center;">
        <button id="startBtn" disabled>Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
        <canvas id="visualizer"></canvas>
        <div id="statusText" class="status">Please upload a backing track first.</div>
    </div>

    <div class="section preview-box" id="previewSection">
        <h4>Preview & Download Output</h4>
        <div class="grid-2col">
            <div>
                <label style="font-size: 13px;"><strong>Mixed (Beat + Vocals)</strong></label>
                <audio id="previewMixed" controls></audio>
                <button class="download-btn" id="dlMixedBtn">Download Mix</button>
            </div>
            <div>
                <label style="font-size: 13px;"><strong>Vocal Track Only</strong></label>
                <audio id="previewMic" controls></audio>
                <button class="download-btn" id="dlMicBtn">Download Vocals</button>
            </div>
        </div>
    </div>
</div>

<script>
    // System Elements
    const audioFileInput = document.getElementById('audioFile');
    const backingTrackEl = document.getElementById('backingTrack');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const previewSection = document.getElementById('previewSection');

    // Audacity Parameters Setup
    const params = {
        room: document.getElementById('param_room'),
        predelay: document.getElementById('param_predelay'),
        rev: document.getElementById('param_rev'),
        damp: document.getElementById('param_damp'),
        tonelow: document.getElementById('param_tonelow'),
        tonehigh: document.getElementById('param_tonehigh'),
        wetgain: document.getElementById('param_wetgain'),
        drygain: document.getElementById('param_drygain'),
        width: document.getElementById('param_width')
    };

    // Update UI Labels
    Object.keys(params).forEach(key => {
        params[key].addEventListener('input', (e) => {
            document.getElementById('val_' + key).innerText = e.target.value;
            applyRealtimeParams(); // Apply EQ & Gains smoothly
        });
        // Generate heavy Impulse Response ONLY when mouse is released to avoid audio glitching
        params[key].addEventListener('change', generateIR); 
    });

    document.getElementById('reverbToggle').addEventListener('change', applyRealtimeParams);

    // Canvas Setup
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    drawFlatLine();

    // Audio Context & DSP Nodes
    let audioCtx, mixedDest, vocalDest, vocalMixer;
    let trackSourceNode, micSourceNode, micStream;
    let convolver, dryGain, wetGain, preDelay, toneLow, toneHigh;
    let mixedRecorder, micRecorder, analyser, animationId;
    let mixedChunks = [], micChunks = [];
    let finalMixedBlob = null, finalMicBlob = null;

    audioFileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            backingTrackEl.src = URL.createObjectURL(e.target.files[0]);
            startBtn.disabled = false;
            statusText.innerText = "Ready to record. Press Start.";
        }
    });

    // DSP: Converts Decibels to Linear Gain
    function dBToLinear(db) {
        return Math.pow(10, db / 20);
    }

    // DSP: Generates the Audacity-Style Impulse Response Buffer
    function generateIR() {
        if (!audioCtx || !convolver) return;
        
        let sampleRate = audioCtx.sampleRate;
        let rs = parseFloat(params.room.value) / 100;
        let reverberance = parseFloat(params.rev.value) / 100;
        let damping = parseFloat(params.damp.value) / 100;
        let stereoWidth = parseFloat(params.width.value) / 100;

        // Calculate IR Length (Audacity scales this up to several seconds)
        let duration = 0.5 + (rs * 3) + (reverberance * 2);
        let length = Math.floor(sampleRate * duration);
        let buffer = audioCtx.createBuffer(2, length, sampleRate);
        let left = buffer.getChannelData(0);
        let right = buffer.getChannelData(1);

        let lpL = 0, lpR = 0;
        let dampFactor = damping * 0.95; 

        for (let i = 0; i < length; i++) {
            let t = i / sampleRate;
            let decay = Math.exp(-t * (5 - reverberance * 4)); 

            // White noise generation
            let nL = Math.random() * 2 - 1;
            let nR = Math.random() * 2 - 1;

            // Apply Stereo Width
            let mid = (nL + nR) / 2;
            nL = mid + stereoWidth * (nL - mid);
            nR = mid + stereoWidth * (nR - mid);

            // Apply Damping (Lowpass Filter over time)
            lpL = (lpL * dampFactor) + (nL * (1 - dampFactor));
            lpR = (lpR * dampFactor) + (nR * (1 - dampFactor));

            left[i] = lpL * decay;
            right[i] = lpR * decay;
        }
        convolver.buffer = buffer;
    }

    // DSP: Applies EQ, Pre-delay, and Gains in real-time
    function applyRealtimeParams() {
        if (!audioCtx || !wetGain) return;
        
        if (document.getElementById('reverbToggle').checked) {
            // Apply Pre-delay
            preDelay.delayTime.setTargetAtTime(parseFloat(params.predelay.value) / 1000, audioCtx.currentTime, 0.01);
            
            // Apply Tone (EQ) - Maps 0-100% to -24dB to 0dB
            toneLow.gain.setTargetAtTime((parseFloat(params.tonelow.value) - 100) * 0.24, audioCtx.currentTime, 0.01);
            toneHigh.gain.setTargetAtTime((parseFloat(params.tonehigh.value) - 100) * 0.24, audioCtx.currentTime, 0.01);

            // Apply Wet/Dry Gains
            wetGain.gain.setTargetAtTime(dBToLinear(parseFloat(params.wetgain.value)), audioCtx.currentTime, 0.01);
            dryGain.gain.setTargetAtTime(dBToLinear(parseFloat(params.drygain.value)), audioCtx.currentTime, 0.01);
        } else {
            // Bypass Reverb
            wetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            dryGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.01);
        }
    }

    function drawFlatLine() {
        canvasCtx.fillStyle = '#101418';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#0fbcf9';
        canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2);
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    function drawWaveform() {
        animationId = requestAnimationFrame(drawWaveform);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#101418';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#0fbcf9';
        canvasCtx.beginPath();

        const sliceWidth = canvas.width * 1.0 / bufferLength;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = v * (canvas.height / 2);
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }

    // 2. Start Recording & DSP Setup
    startBtn.addEventListener('click', async () => {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                mixedDest = audioCtx.createMediaStreamDestination();
                vocalDest = audioCtx.createMediaStreamDestination();
                vocalMixer = audioCtx.createGain();

                vocalMixer.connect(mixedDest);
                vocalMixer.connect(vocalDest);

                // --- Audacity DSP Chain Build ---
                dryGain = audioCtx.createGain();
                wetGain = audioCtx.createGain();
                
                preDelay = audioCtx.createDelay(1.0); // Max 1 second delay buffer
                convolver = audioCtx.createConvolver();
                
                toneLow = audioCtx.createBiquadFilter();
                toneLow.type = 'lowshelf';
                toneLow.frequency.value = 250; 
                
                toneHigh = audioCtx.createBiquadFilter();
                toneHigh.type = 'highshelf';
                toneHigh.frequency.value = 4000; 

                // Routing Wet Path: Mic -> PreDelay -> Convolver -> ToneLow -> ToneHigh -> WetGain -> Mixer
                preDelay.connect(convolver);
                convolver.connect(toneLow);
                toneLow.connect(toneHigh);
                toneHigh.connect(wetGain);
                wetGain.connect(vocalMixer);

                // Routing Dry Path: Mic -> DryGain -> Mixer
                dryGain.connect(vocalMixer);

                // Initialize DSP values
                generateIR();
                applyRealtimeParams();

                // Routing Backing Track
                trackSourceNode = audioCtx.createMediaElementSource(backingTrackEl);
                trackSourceNode.connect(audioCtx.destination); 
                trackSourceNode.connect(mixedDest); 
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            // Hardware Mic Access (Raw)
            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
                video: false 
            });
            micSourceNode = audioCtx.createMediaStreamSource(micStream);
            
            // Connect mic to both Wet and Dry paths
            micSourceNode.connect(dryGain);
            micSourceNode.connect(preDelay); 

            // Visualizer Hook
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            vocalMixer.connect(analyser);
            drawWaveform(); 

            // Recorders Setup
            mixedChunks = []; micChunks = [];
            const bps = parseInt(document.getElementById('bitrateSelect').value);
            const options = { audioBitsPerSecond: bps };

            mixedRecorder = new MediaRecorder(mixedDest.stream, options);
            micRecorder = new MediaRecorder(vocalDest.stream, options);

            mixedRecorder.ondataavailable = e => { if (e.data.size > 0) mixedChunks.push(e.data); };
            micRecorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };

            mixedRecorder.onstop = () => {
                finalMixedBlob = new Blob(mixedChunks, { type: 'audio/webm' });
                document.getElementById('previewMixed').src = URL.createObjectURL(finalMixedBlob);
            };

            micRecorder.onstop = () => {
                finalMicBlob = new Blob(micChunks, { type: 'audio/webm' });
                document.getElementById('previewMic').src = URL.createObjectURL(finalMicBlob);
                previewSection.style.display = 'block'; 
            };

            mixedRecorder.start(); micRecorder.start();
            backingTrackEl.currentTime = 0; backingTrackEl.play();

            startBtn.disabled = true; stopBtn.disabled = false; audioFileInput.disabled = true;
            statusText.innerText = `🔴 Recording (Audacity DSP Enabled)...`;
            statusText.style.color = "#ff3f34";

        } catch (err) {
            console.error(err);
            statusText.innerText = "Error accessing mic: " + err.message;
        }
    });

    // 3. Stop Recording
    stopBtn.addEventListener('click', () => {
        if (mixedRecorder && mixedRecorder.state !== 'inactive') mixedRecorder.stop();
        if (micRecorder && micRecorder.state !== 'inactive') micRecorder.stop();
        
        backingTrackEl.pause();
        if (micSourceNode) micSourceNode.disconnect();
        if (micStream) micStream.getTracks().forEach(track => track.stop());

        cancelAnimationFrame(animationId);
        drawFlatLine();

        startBtn.disabled = false; stopBtn.disabled = true; audioFileInput.disabled = false;
        statusText.innerText = "Recording complete! Listen to the previews below.";
        statusText.style.color = "#05c46b";
    });

    // --- Format Conversion & Downloader ---
    document.getElementById('dlMixedBtn').addEventListener('click', () => processAndDownload(finalMixedBlob, 'Mixed_Master'));
    document.getElementById('dlMicBtn').addEventListener('click', () => processAndDownload(finalMicBlob, 'Vocal_Stem'));

    async function processAndDownload(webmBlob, filenameBase) {
        if (!webmBlob) return;
        
        const format = document.getElementById('formatSelect').value;
        statusText.innerText = `Exporting as ${format.toUpperCase()}... please wait.`;
        statusText.style.color = "#ffdd59";
        
        let outBlob = webmBlob;
        let ext = "webm";

        if (format === 'wav' || format === 'mp3') {
            const arrayBuffer = await webmBlob.arrayBuffer();
            const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);

            if (format === 'wav') {
                outBlob = audioBufferToWav(audioBuffer);
                ext = "wav";
            } else if (format === 'mp3') {
                outBlob = await encodeMp3(audioBuffer);
                ext = "mp3";
            }
        }

        const url = URL.createObjectURL(outBlob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = `${filenameBase}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        statusText.innerText = "Export completed successfully!";
        statusText.style.color = "#05c46b";
    }

    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferArray = new ArrayBuffer(length),
            view = new DataView(bufferArray),
            channels = [], i, sample, offset = 0, pos = 0;

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16);
        setUint32(0x61746164); setUint32(length - pos - 4);

        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while (pos < buffer.length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true); offset += 2;
            }
            pos++;
        }
        return new Blob([bufferArray], {type: "audio/wav"});

        function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
        function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }
    }

    async function encodeMp3(audioBuffer) {
        if (!window.lamejs) {
            alert("MP3 library failed. Exporting as WAV.");
            return audioBufferToWav(audioBuffer);
        }
        const channels = audioBuffer.numberOfChannels;
        const mp3encoder = new lamejs.Mp3Encoder(channels, audioBuffer.sampleRate, 192); 
        const mp3Data = [];
        const sampleBlockSize = 1152;
        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
        const leftInt16 = new Int16Array(left.length);
        const rightInt16 = new Int16Array(right.length);
        
        for (let i = 0; i < left.length; i++) {
            leftInt16[i] = left[i] * 32767.5;
            rightInt16[i] = right[i] * 32767.5;
        }
        for (let i = 0; i < left.length; i += sampleBlockSize) {
            const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
            const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
            const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }
</script>

</body>
</html>
