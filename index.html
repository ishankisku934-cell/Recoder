<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Processing Web Audio Studio (Audacity Style)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #2c3e50;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 700px;
        }
        h2 { margin-top: 0; color: #0fbcf9; text-align: center; }
        .section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #485460;
        }
        .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        select, input[type="file"], input[type="range"] {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #718093;
            background-color: #353b48;
            color: white;
            box-sizing: border-box;
        }
        audio { width: 100%; margin-top: 10px; height: 35px; outline: none; }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #startBtn { background-color: #05c46b; color: white; width: 47%; }
        #stopBtn { background-color: #ff3f34; color: white; width: 47%; }
        .action-btn { background-color: #0fbcf9; color: #1e272e; width: 100%; margin-top: 10px; }
        .action-btn:hover { background-color: #4bcffa; }
        .download-btn { background-color: #3c40c6; color: white; width: 100%; margin: 5px 0;}
        .download-btn:hover { background-color: #575fcf; }
        button:disabled { background-color: #808e9b; color: #d2dae2; cursor: not-allowed; }
        
        #postProcessingSection { display: none; }
        
        .effect-panel {
            background-color: #101418;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #0fbcf9;
        }
        .slider-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
            margin-top: 10px;
        }
        .slider-group { display: flex; flex-direction: column; font-size: 12px; }
        .slider-header { display: flex; justify-content: space-between; color: #bdc3c7; }

        canvas {
            width: 100%;
            height: 80px;
            background-color: #101418;
            border-radius: 6px;
            margin-top: 15px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            display: block;
        }

        .status { font-size: 14px; color: #ffdd59; margin-top: 10px; min-height: 20px; font-weight: bold; text-align: center; }
        .timer { font-size: 20px; color: #0fbcf9; text-align: center; margin: 5px 0; font-family: monospace; }

        .track-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .track-item { 
            background: #353b48; padding: 10px; margin-bottom: 8px; 
            border-radius: 6px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .track-name { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
        .track-controls { display: flex; gap: 8px; font-size: 13px; align-items: center; flex-wrap: wrap; }
        .checkbox-label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #0fbcf9; }
        .volume-slider { width: 80px; margin: 0 4px; }
        .volume-value { min-width: 35px; text-align: right; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>Post-Processing Studio</h2>
    
    <div class="section">
        <label><strong>1. Upload Backing Tracks (Up to 10):</strong></label>
        <input type="file" id="audioFiles" accept="audio/*" multiple>
        <div id="trackListContainer" class="track-list"></div>
    </div>

    <div class="section" style="text-align: center;">
        <div style="text-align: left; margin-bottom: 10px;"><strong>2. Record Raw Vocals:</strong></div>
        <button id="startBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
        <div id="timerDisplay" class="timer">00:00.0</div>
        <canvas id="visualizer"></canvas>
        <div id="statusText" class="status">Ready. Press Start to record Vocals.</div>
    </div>

    <div class="section" id="postProcessingSection">
        <div style="font-size: 18px; font-weight: bold; color: #0fbcf9; margin-bottom: 10px; border-bottom: 1px solid #485460; padding-bottom: 5px;">
            3. Post-Processing & Export
        </div>
        
        <!-- Vocal track with volume slider -->
        <div class="track-item" style="background: #2f3640; border: 1px solid #e1b12c; display: flex; flex-wrap: wrap; gap: 10px;">
            <div class="track-name" style="color: #e1b12c; font-weight: bold;">🎤 Recorded Vocal</div>
            <div class="track-controls" style="flex: 1; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label class="checkbox-label" style="color: #e1b12c;"><input type="checkbox" id="vocalMix" checked> In Mix</label>
                    <label class="checkbox-label" style="color: #e1b12c;"><input type="checkbox" id="vocalFx" checked> Apply FX</label>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="font-size:12px;">Vol:</span>
                    <input type="range" id="vocalVolumeSlider" min="0" max="2" step="0.05" value="1.0" class="volume-slider" style="width:100px;">
                    <span id="vocalVolumeVal" class="volume-value">1.00</span>
                </div>
            </div>
        </div>

        <button class="action-btn" id="previewBtn">▶ Play / Pause Preview</button>
        
        <div class="effect-panel">
            <label style="color: #0fbcf9; font-weight: bold;">
                <input type="checkbox" id="reverbToggle" checked> Enable Reverb Engine (For Selected Tracks)
            </label>
            <div class="slider-grid">
                <div class="slider-group">
                    <div class="slider-header"><span>Room Size (%)</span><span id="val_room">75</span></div>
                    <input type="range" id="param_room" min="0" max="100" value="75">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Pre-delay (ms)</span><span id="val_predelay">10</span></div>
                    <input type="range" id="param_predelay" min="0" max="200" value="10">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Reverberance (%)</span><span id="val_rev">50</span></div>
                    <input type="range" id="param_rev" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Damping (%)</span><span id="val_damp">50</span></div>
                    <input type="range" id="param_damp" min="0" max="100" value="50">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Tone Low (%)</span><span id="val_tonelow">100</span></div>
                    <input type="range" id="param_tonelow" min="0" max="100" value="100">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Tone High (%)</span><span id="val_tonehigh">100</span></div>
                    <input type="range" id="param_tonehigh" min="0" max="100" value="100">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Wet Gain (dB)</span><span id="val_wetgain">-1</span></div>
                    <input type="range" id="param_wetgain" min="-20" max="10" value="-1" step="0.5">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Dry Gain (dB)</span><span id="val_drygain">-1</span></div>
                    <input type="range" id="param_drygain" min="-20" max="10" value="-1" step="0.5">
                </div>
                <div class="slider-group">
                    <div class="slider-header"><span>Stereo Width (%)</span><span id="val_width">100</span></div>
                    <input type="range" id="param_width" min="0" max="100" value="100">
                </div>
            </div>
        </div>

        <div class="grid-2col" style="margin-top: 15px;">
            <div>
                <label>Export Format:</label>
                <select id="formatSelect">
                    <option value="mp3">MP3</option>
                    <option value="wav" selected>WAV</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; justify-content: flex-end;">
                <button class="download-btn" id="dlMixedBtn">Download Mix (Selected Tracks)</button>
                <button class="download-btn" id="dlMicBtn">Download Vocals Only</button>
            </div>
        </div>
    </div>
</div>

<script>
    const audioFilesInput = document.getElementById('audioFiles');
    const trackListContainer = document.getElementById('trackListContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const timerDisplay = document.getElementById('timerDisplay');
    const postProcessingSection = document.getElementById('postProcessingSection');
    const previewBtn = document.getElementById('previewBtn');

    // UI Sliders for reverb
    const params = {
        room: document.getElementById('param_room'), predelay: document.getElementById('param_predelay'),
        rev: document.getElementById('param_rev'), damp: document.getElementById('param_damp'),
        tonelow: document.getElementById('param_tonelow'), tonehigh: document.getElementById('param_tonehigh'),
        wetgain: document.getElementById('param_wetgain'), drygain: document.getElementById('param_drygain'),
        width: document.getElementById('param_width')
    };

    // System Variables
    let audioCtx;
    let backingTracks = []; // Array of {id, name, buffer, includeMix, applyFx, volume}
    let vocalBuffer = null;
    let vocalVolume = 1.0; // New: vocal volume
    let micStream, micRecorder, micChunks = [];
    let analyser, animationId;
    let recordingStartTime, timerInterval;
    
    let isPreviewPlaying = false;
    let previewSources = [];
    let liveDSP = null;

    // Canvas Setup
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    drawFlatLine();

    // Context Initializer
    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 1. Upload Multiple Backing Tracks
    audioFilesInput.addEventListener('change', async (e) => {
        initAudioContext();
        const files = Array.from(e.target.files).slice(0, 10); // Limit to 10
        if (files.length > 0) {
            statusText.innerText = `Decoding ${files.length} track(s)... please wait.`;
            startBtn.disabled = true;
            
            for (let i = 0; i < files.length; i++) {
                const arrayBuffer = await files[i].arrayBuffer();
                const buffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                backingTracks.push({
                    id: Date.now() + i,
                    name: files[i].name,
                    buffer: buffer,
                    includeMix: true,
                    applyFx: false,
                    volume: 1.0  // default volume
                });
            }
            
            renderTrackList();
            startBtn.disabled = false;
            statusText.innerText = "Tracks ready. You can record Vocals or Preview Mix.";
            
            // Show processing section if tracks are loaded
            postProcessingSection.style.display = 'block';
        }
    });

    // Render Track UI Checkboxes + Volume Slider
    function renderTrackList() {
        trackListContainer.innerHTML = '';
        backingTracks.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <div class="track-name" title="${track.name}">${index + 1}. ${track.name}</div>
                <div class="track-controls">
                    <label class="checkbox-label"><input type="checkbox" onchange="updateTrack(${index}, 'includeMix', this.checked)" ${track.includeMix ? 'checked' : ''}> Mix</label>
                    <label class="checkbox-label"><input type="checkbox" onchange="updateTrack(${index}, 'applyFx', this.checked)" ${track.applyFx ? 'checked' : ''}> FX</label>
                    <div style="display: flex; align-items: center; gap:4px;">
                        <span style="font-size:11px;">Vol</span>
                        <input type="range" min="0" max="2" step="0.05" value="${track.volume}" class="volume-slider" oninput="updateTrackVolume(${index}, this.value)">
                        <span id="vol_${index}" class="volume-value">${track.volume.toFixed(2)}</span>
                    </div>
                    <button style="padding: 2px 8px; margin: 0; font-size: 12px; background: #ff3f34;" onclick="removeTrack(${index})">X</button>
                </div>
            `;
            trackListContainer.appendChild(div);
        });
    }

    window.updateTrack = (index, prop, value) => { backingTracks[index][prop] = value; };
    window.updateTrackVolume = (index, val) => { 
        backingTracks[index].volume = parseFloat(val); 
        document.getElementById(`vol_${index}`).innerText = parseFloat(val).toFixed(2);
    };
    window.removeTrack = (index) => { backingTracks.splice(index, 1); renderTrackList(); };

    // Vocal volume slider
    const vocalSlider = document.getElementById('vocalVolumeSlider');
    const vocalVal = document.getElementById('vocalVolumeVal');
    vocalSlider.addEventListener('input', (e) => {
        vocalVolume = parseFloat(e.target.value);
        vocalVal.innerText = vocalVolume.toFixed(2);
    });

    // 2. Start Raw Recording
    startBtn.addEventListener('click', async () => {
        try {
            initAudioContext();
            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
                video: false 
            });
            
            const micSourceNode = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            micSourceNode.connect(analyser);
            drawWaveform();

            micChunks = [];
            micRecorder = new MediaRecorder(micStream, { audioBitsPerSecond: 256000 });
            micRecorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };
            
            micRecorder.onstop = async () => {
                const blob = new Blob(micChunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                vocalBuffer = await audioCtx.decodeAudioData(arrayBuffer); 
                
                postProcessingSection.style.display = 'block'; 
                statusText.innerText = "Vocal saved! Select FX and Mix options below.";
                statusText.style.color = "#0fbcf9";
                postProcessingSection.scrollIntoView({ behavior: "smooth" });
            };

            micRecorder.start();
            startBtn.disabled = true; stopBtn.disabled = false; audioFilesInput.disabled = true;
            statusText.innerText = `🔴 Recording Raw Vocals...`;
            statusText.style.color = "#ff3f34";

            // Start Timer
            recordingStartTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);

            // If preview was playing, stop it
            if(isPreviewPlaying) previewBtn.click();
            
            // 🔁 Play ALL backing tracks for monitoring (ignoring includeMix, but respecting volume)
            previewSources = []; // reuse array to store monitoring sources
            backingTracks.forEach(track => {
                const src = audioCtx.createBufferSource();
                src.buffer = track.buffer;
                // Create gain node for volume
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(track.volume, audioCtx.currentTime);
                src.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                src.start(0);
                previewSources.push(src); // store to stop later
            });

        } catch (err) {
            statusText.innerText = "Error accessing mic: " + err.message;
        }
    });

    // Timer update function
    function updateTimer() {
        const elapsed = (Date.now() - recordingStartTime) / 1000;
        const mins = Math.floor(elapsed / 60);
        const secs = Math.floor(elapsed % 60);
        const tenth = Math.floor((elapsed % 1) * 10);
        timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${tenth}`;
    }

    // 3. Stop Recording
    stopBtn.addEventListener('click', () => {
        if (micRecorder && micRecorder.state !== 'inactive') micRecorder.stop();
        
        // Stop monitoring backing tracks
        previewSources.forEach(src => { try { src.stop(); } catch(e){} });
        previewSources = [];

        // Stop timer
        clearInterval(timerInterval);
        timerDisplay.innerText = '00:00.0';

        if (micStream) micStream.getTracks().forEach(track => track.stop());
        cancelAnimationFrame(animationId);
        drawFlatLine();
        startBtn.disabled = false; stopBtn.disabled = true; audioFilesInput.disabled = false;
        statusText.innerText = "Processing recording...";
    });

    // --- DSP LOGIC (unchanged, but ensure it uses the new volume params where needed) ---
    function dBToLinear(db) { return Math.pow(10, db / 20); }

    function createFXBus(context, outputNode) {
        const busInput = context.createGain();
        const dryGain = context.createGain();
        const wetGain = context.createGain();
        const preDelay = context.createDelay(1.0);
        const convolver = context.createConvolver();
        const toneLow = context.createBiquadFilter(); toneLow.type = 'lowshelf'; toneLow.frequency.value = 250;
        const toneHigh = context.createBiquadFilter(); toneHigh.type = 'highshelf'; toneHigh.frequency.value = 4000;

        busInput.connect(dryGain);
        busInput.connect(preDelay);
        preDelay.connect(convolver);
        convolver.connect(toneLow);
        toneLow.connect(toneHigh);
        toneHigh.connect(wetGain);
        
        dryGain.connect(outputNode);
        wetGain.connect(outputNode);

        const dspNodes = { input: busInput, dryGain, wetGain, preDelay, convolver, toneLow, toneHigh, context };
        applyDSPParams(dspNodes);
        return dspNodes;
    }

    function applyDSPParams(dsp) {
        if (!dsp || !dsp.context) return;
        const time = dsp.context.currentTime;
        
        if (document.getElementById('reverbToggle').checked) {
            dsp.preDelay.delayTime.setValueAtTime(parseFloat(params.predelay.value) / 1000, time);
            dsp.toneLow.gain.setValueAtTime((parseFloat(params.tonelow.value) - 100) * 0.24, time);
            dsp.toneHigh.gain.setValueAtTime((parseFloat(params.tonehigh.value) - 100) * 0.24, time);
            dsp.wetGain.gain.setValueAtTime(dBToLinear(parseFloat(params.wetgain.value)), time);
            dsp.dryGain.gain.setValueAtTime(dBToLinear(parseFloat(params.drygain.value)), time);
            
            let sr = dsp.context.sampleRate;
            let rs = parseFloat(params.room.value) / 100;
            let rev = parseFloat(params.rev.value) / 100;
            let damp = parseFloat(params.damp.value) / 100;
            let wid = parseFloat(params.width.value) / 100;
            
            let len = Math.floor(sr * (0.5 + (rs * 3) + (rev * 2)));
            let irBuffer = dsp.context.createBuffer(2, len, sr);
            let L = irBuffer.getChannelData(0), R = irBuffer.getChannelData(1);
            let lpL = 0, lpR = 0, dampFactor = damp * 0.95;

            for (let i = 0; i < len; i++) {
                let t = i / sr;
                let decay = Math.exp(-t * (5 - rev * 4));
                let nL = Math.random() * 2 - 1, nR = Math.random() * 2 - 1;
                let mid = (nL + nR) / 2;
                nL = mid + wid * (nL - mid); nR = mid + wid * (nR - mid);
                lpL = (lpL * dampFactor) + (nL * (1 - dampFactor));
                lpR = (lpR * dampFactor) + (nR * (1 - dampFactor));
                L[i] = lpL * decay; R[i] = lpR * decay;
            }
            dsp.convolver.buffer = irBuffer;
        } else {
            dsp.wetGain.gain.setValueAtTime(0, time);
            dsp.dryGain.gain.setValueAtTime(1, time);
        }
    }

    Object.keys(params).forEach(key => {
        params[key].addEventListener('input', (e) => {
            document.getElementById('val_' + key).innerText = e.target.value;
        });
        params[key].addEventListener('change', () => {
            if (isPreviewPlaying && liveDSP) applyDSPParams(liveDSP);
        });
    });
    document.getElementById('reverbToggle').addEventListener('change', () => {
        if (isPreviewPlaying && liveDSP) applyDSPParams(liveDSP);
    });

    // --- PREVIEW PLAYBACK (now includes volume) ---
    previewBtn.addEventListener('click', () => {
        if (!vocalBuffer && backingTracks.length === 0) return;

        if (isPreviewPlaying) {
            previewSources.forEach(src => { try { src.stop(); } catch(e){} });
            previewSources = [];
            isPreviewPlaying = false;
            previewBtn.innerText = "▶ Play / Pause Preview";
            return;
        }

        initAudioContext();
        liveDSP = createFXBus(audioCtx, audioCtx.destination);
        
        let vocalMix = document.getElementById('vocalMix').checked;
        let vocalFx = document.getElementById('vocalFx').checked;

        // Play Vocal with volume
        if (vocalBuffer && vocalMix) {
            const vSrc = audioCtx.createBufferSource();
            vSrc.buffer = vocalBuffer;
            const vGain = audioCtx.createGain();
            vGain.gain.setValueAtTime(vocalVolume, audioCtx.currentTime);
            vSrc.connect(vGain);
            if (vocalFx) vGain.connect(liveDSP.input);
            else vGain.connect(audioCtx.destination);
            vSrc.start(0);
            previewSources.push(vSrc);
            
            vSrc.onended = () => { 
                if (isPreviewPlaying) previewBtn.click(); // auto stop
            };
        }

        // Play Selected Backing Tracks with individual volume
        backingTracks.forEach(track => {
            if(track.includeMix) {
                const bSrc = audioCtx.createBufferSource();
                bSrc.buffer = track.buffer;
                const bGain = audioCtx.createGain();
                bGain.gain.setValueAtTime(track.volume, audioCtx.currentTime);
                bSrc.connect(bGain);
                if (track.applyFx) bGain.connect(liveDSP.input);
                else bGain.connect(audioCtx.destination);
                bSrc.start(0);
                previewSources.push(bSrc);
            }
        });

        if(previewSources.length > 0) {
            isPreviewPlaying = true;
            previewBtn.innerText = "⏸ Stop Preview";
        }
    });

    // --- EXPORT (with volume) ---
    document.getElementById('dlMixedBtn').addEventListener('click', () => exportAudio('mix'));
    document.getElementById('dlMicBtn').addEventListener('click', () => exportAudio('vocal'));

    async function exportAudio(mode) {
        if (isPreviewPlaying) previewBtn.click(); // Stop preview

        let renderVocals = (mode === 'vocal' || (mode === 'mix' && document.getElementById('vocalMix').checked)) && vocalBuffer;
        let renderTracks = mode === 'mix' ? backingTracks.filter(t => t.includeMix) : [];
        
        if (!renderVocals && renderTracks.length === 0) {
            alert("No tracks selected for export!"); return;
        }

        const format = document.getElementById('formatSelect').value;
        statusText.innerText = `Rendering ${format.toUpperCase()}... please wait.`;
        statusText.style.color = "#ffdd59";

        // Calculate max length
        let maxLen = renderVocals ? vocalBuffer.length : 0;
        renderTracks.forEach(t => { if(t.buffer.length > maxLen) maxLen = t.buffer.length; });
        maxLen += audioCtx.sampleRate * 3; // Reverb tail

        const offlineCtx = new OfflineAudioContext(2, maxLen, audioCtx.sampleRate);
        const offlineDSP = createFXBus(offlineCtx, offlineCtx.destination);

        // Render Vocal with volume
        if (renderVocals) {
            const vSrc = offlineCtx.createBufferSource();
            vSrc.buffer = vocalBuffer;
            const vGain = offlineCtx.createGain();
            vGain.gain.value = vocalVolume;
            vSrc.connect(vGain);
            if (document.getElementById('vocalFx').checked) vGain.connect(offlineDSP.input);
            else vGain.connect(offlineCtx.destination);
            vSrc.start(0);
        }

        // Render Tracks with volume
        renderTracks.forEach(track => {
            const bSrc = offlineCtx.createBufferSource();
            bSrc.buffer = track.buffer;
            const bGain = offlineCtx.createGain();
            bGain.gain.value = track.volume;
            bSrc.connect(bGain);
            if (track.applyFx) bGain.connect(offlineDSP.input);
            else bGain.connect(offlineCtx.destination);
            bSrc.start(0);
        });

        const renderedBuffer = await offlineCtx.startRendering();

        let finalBlob;
        if (format === 'wav') finalBlob = audioBufferToWav(renderedBuffer);
        else finalBlob = await encodeMp3(renderedBuffer);

        const url = URL.createObjectURL(finalBlob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = mode === 'mix' ? `Final_Mix.${format}` : `Processed_Vocal.${format}`;
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);

        statusText.innerText = "Export successfully completed!";
        statusText.style.color = "#05c46b";
    }

    // --- Format Converters (unchanged) ---
    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels, length = buffer.length * numOfChan * 2 + 44,
            bufferArray = new ArrayBuffer(length), view = new DataView(bufferArray),
            channels = [], i, sample, offset = 0, pos = 0;
        function setUint16(data) { view.setUint16(offset, data, true); offset += 2; }
        function setUint32(data) { view.setUint32(offset, data, true); offset += 4; }
        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);
        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
        while (pos < buffer.length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][pos]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                view.setInt16(offset, sample, true); offset += 2;
            }
            pos++;
        }
        return new Blob([bufferArray], {type: "audio/wav"});
    }

    async function encodeMp3(audioBuffer) {
        if (!window.lamejs) return audioBufferToWav(audioBuffer);
        const channels = audioBuffer.numberOfChannels;
        const mp3encoder = new lamejs.Mp3Encoder(channels, audioBuffer.sampleRate, 192); 
        const mp3Data = []; const sampleBlockSize = 1152;
        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;
        const leftInt16 = new Int16Array(left.length); const rightInt16 = new Int16Array(right.length);
        for (let i = 0; i < left.length; i++) {
            leftInt16[i] = left[i] * 32767.5; rightInt16[i] = right[i] * 32767.5;
        }
        for (let i = 0; i < left.length; i += sampleBlockSize) {
            const leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
            const rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
            const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }
        const mp3buf = mp3encoder.flush();
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    // --- Visualizer Drawing (unchanged) ---
    function drawFlatLine() {
        canvasCtx.fillStyle = '#101418'; canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#0fbcf9'; canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2); canvasCtx.lineTo(canvas.width, canvas.height / 2); canvasCtx.stroke();
    }
    function drawWaveform() {
        animationId = requestAnimationFrame(drawWaveform);
        const bufferLength = analyser.frequencyBinCount; const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);
        canvasCtx.fillStyle = '#101418'; canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#0fbcf9'; canvasCtx.beginPath();
        const sliceWidth = canvas.width * 1.0 / bufferLength; let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0; const y = v * (canvas.height / 2);
            if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y); x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2); canvasCtx.stroke();
    }
