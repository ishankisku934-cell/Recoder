<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Audio Recorder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            margin: 0;
        }
        .recorder-box {
            background-color: #ecf0f1;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }
        h2 {
            color: #34495e;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #startBtn {
            background-color: #27ae60;
            color: white;
        }
        #startBtn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #stopBtn {
            background-color: #e74c3c;
            color: white;
        }
        #stopBtn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        audio {
            margin-top: 25px;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="recorder-box">
        <h2>Audio Recorder</h2>
        <button id="startBtn">Start Recording</button>
        <button id="stopBtn" disabled>Stop</button>
        
        <br>
        <audio id="audioPlayback" controls></audio>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');

        startBtn.addEventListener('click', async () => {
            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                audioChunks = []; // Clear previous recordings
                
                mediaRecorder.addEventListener("dataavailable", event => {
                    audioChunks.push(event.data);
                });

                mediaRecorder.addEventListener("stop", () => {
                    // Create audio blob and set it to the audio element
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                });

                mediaRecorder.start();
                
                // UI updates
                startBtn.disabled = true;
                stopBtn.disabled = false;
                startBtn.innerText = "Recording...";

            } catch (err) {
                alert("Microphone access is required to record audio. Error: " + err.message);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                
                // Stop all microphone tracks to turn off the recording indicator
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                
                // UI updates
                startBtn.disabled = false;
                stopBtn.disabled = true;
                startBtn.innerText = "Start Recording";
            }
        });
    </script>

</body>
</html>
