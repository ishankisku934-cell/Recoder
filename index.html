<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Quality Web Audio Mixer & Recorder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e272e;
            color: #d2dae2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2c3e50;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #0fbcf9;
        }
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #485460;
        }
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        input[type="file"] {
            margin: 10px 0;
            width: 100%;
        }
        audio {
            width: 100%;
            margin-top: 10px;
            height: 40px;
            outline: none;
        }
        button {
            padding: 12px 20px;
            margin: 8px 5px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #startBtn {
            background-color: #05c46b;
            color: white;
        }
        #stopBtn {
            background-color: #ff3f34;
            color: white;
        }
        button:disabled {
            background-color: #808e9b;
            color: #d2dae2;
            cursor: not-allowed;
            transform: scale(0.98);
        }
        .download-links a {
            display: none;
            text-decoration: none;
            background-color: #3c40c6;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 5px;
            font-size: 14px;
        }
        .download-links a:hover {
            background-color: #575fcf;
        }
        .status {
            font-size: 14px;
            color: #ffdd59;
            margin-top: 10px;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Studio Mixer & Recorder</h2>
    
    <div class="section">
        <label for="audioFile"><strong>1. Upload Backing Track:</strong></label>
        <input type="file" id="audioFile" accept="audio/*">
        <audio id="backingTrack" controls></audio>
    </div>

    <div class="section">
        <strong>2. Record Vocals:</strong><br>
        <button id="startBtn" disabled>Start Recording</button>
        <button id="stopBtn" disabled>Stop Recording</button>
        <div id="statusText" class="status">Please upload an audio file first.</div>
    </div>

    <div class="section download-links" id="downloadSection">
        <strong>3. Downloads:</strong><br>
        <a id="downloadMixed" href="#">Download Mixed Audio</a>
        <a id="downloadMic" href="#">Download Mic Only</a>
    </div>
</div>

<script>
    // UI Elements
    const audioFileInput = document.getElementById('audioFile');
    const backingTrackEl = document.getElementById('backingTrack');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const downloadMixed = document.getElementById('downloadMixed');
    const downloadMic = document.getElementById('downloadMic');

    // Audio Graph & Recorders
    let audioCtx;
    let mixedDest;
    let trackSourceNode;
    let micSourceNode;
    let micStream;
    
    let mixedRecorder;
    let micRecorder;
    let mixedChunks = [];
    let micChunks = [];

    // 1. Handle File Upload
    audioFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const objectUrl = URL.createObjectURL(file);
            backingTrackEl.src = objectUrl;
            startBtn.disabled = false;
            statusText.innerText = "Ready to record. Press Start.";
            
            // Hide download links if a new file is uploaded
            downloadMixed.style.display = 'none';
            downloadMic.style.display = 'none';
        }
    });

    // 2. Start Recording (High Quality Settings Applied)
    startBtn.addEventListener('click', async () => {
        try {
            // Initialize AudioContext on user interaction
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create a destination node for the final mix
                mixedDest = audioCtx.createMediaStreamDestination();
                
                // Route the backing track into the Web Audio API
                trackSourceNode = audioCtx.createMediaElementSource(backingTrackEl);
                
                // Connect backing track to speakers (so you can hear it)
                trackSourceNode.connect(audioCtx.destination);
                
                // Connect backing track to the mix destination
                trackSourceNode.connect(mixedDest);
            }

            // Resume context if suspended (browser auto-play policies)
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Request microphone access (Raw Audio: No Echo Cancellation/Noise Suppression)
            micStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                }, 
                video: false 
            });
            
            // Route microphone into the Web Audio API
            micSourceNode = audioCtx.createMediaStreamSource(micStream);
            
            // Connect microphone ONLY to the mix destination (not speakers, to prevent feedback loop)
            micSourceNode.connect(mixedDest);

            // Setup MediaRecorders
            mixedChunks = [];
            micChunks = [];
            
            // Set Bitrate to 256 kbps
            const options = { audioBitsPerSecond: 256000 };

            // Recorder 1: Captures the mixed destination stream
            mixedRecorder = new MediaRecorder(mixedDest.stream, options);
            // Recorder 2: Captures the raw microphone stream
            micRecorder = new MediaRecorder(micStream, options);

            mixedRecorder.ondataavailable = e => { if (e.data.size > 0) mixedChunks.push(e.data); };
            micRecorder.ondataavailable = e => { if (e.data.size > 0) micChunks.push(e.data); };

            // Handle file generation on stop
            mixedRecorder.onstop = () => {
                const blob = new Blob(mixedChunks, { type: 'audio/webm' });
                downloadMixed.href = URL.createObjectURL(blob);
                downloadMixed.download = 'Mixed_Track_HQ.webm';
                downloadMixed.style.display = 'inline-block';
            };

            micRecorder.onstop = () => {
                const blob = new Blob(micChunks, { type: 'audio/webm' });
                downloadMic.href = URL.createObjectURL(blob);
                downloadMic.download = 'Vocal_Only_HQ.webm';
                downloadMic.style.display = 'inline-block';
            };

            // Start Everything
            mixedRecorder.start();
            micRecorder.start();
            
            // Reset and play the backing track
            backingTrackEl.currentTime = 0;
            backingTrackEl.play();

            // UI Updates
            startBtn.disabled = true;
            stopBtn.disabled = false;
            audioFileInput.disabled = true;
            statusText.innerText = "🔴 Recording in High Quality (256kbps)...";
            statusText.style.color = "#ff3f34";

        } catch (err) {
            console.error(err);
            statusText.innerText = "Error accessing microphone: " + err.message;
        }
    });

    // 3. Stop Recording
    stopBtn.addEventListener('click', () => {
        // Stop Recorders
        if (mixedRecorder && mixedRecorder.state !== 'inactive') mixedRecorder.stop();
        if (micRecorder && micRecorder.state !== 'inactive') micRecorder.stop();
        
        // Stop Backing Track
        backingTrackEl.pause();
        
        // Disconnect Mic to prevent compounding audio nodes if restarted
        if (micSourceNode) micSourceNode.disconnect();
        
        // Release microphone hardware
        if (micStream) {
            micStream.getTracks().forEach(track => track.stop());
        }

        // UI Updates
        startBtn.disabled = false;
        stopBtn.disabled = true;
        audioFileInput.disabled = false;
        statusText.innerText = "Recording complete. Download your files below.";
        statusText.style.color = "#05c46b";
    });
</script>

</body>
</html>
